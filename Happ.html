<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Открыть Happ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 20px; padding: 40px 30px; max-width: 380px; width: 100%; text-align: center; }
.icon { font-size: 64px; margin-bottom: 20px; }
h1 { font-size: 1.5rem; margin-bottom: 10px; }
.sub { font-size: 0.9rem; color: #888; margin-bottom: 30px; }
.btn { display: block; width: 100%; padding: 16px; border-radius: 12px; border: none; cursor: pointer; font-size: 1rem; font-weight: 600; margin-bottom: 12px; text-decoration: none; transition: opacity 0.2s; background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.steps { text-align: left; background: #0a0a0f; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
.step { font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }
.locked { background: rgba(102,126,234,0.1); border: 1px solid rgba(102,126,234,0.3); border-radius: 8px; padding: 12px; font-size: 0.8rem; color: #888; margin-bottom: 12px; }
.hint { font-size: 0.8rem; color: #666; margin-top: 8px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🛡️</div>
  <h1>Открыть Happ</h1>
  <p class="sub">Нажмите кнопку чтобы импортировать подписку</p>

  <button id="openBtn" class="btn" disabled><span class="spinner"></span>Подготовка...</button>

  <div class="steps">
    <div class="step">1️⃣ Нажмите кнопку выше</div>
    <div class="step">2️⃣ Подписка добавится автоматически</div>
    <div class="step">3️⃣ Включите VPN в приложении</div>
  </div>

  <div class="locked">🔒 Подписка защищена шифрованием</div>

  <p class="hint">Нет приложения? <a href="https://happ.su" style="color:#667eea">Установить Happ</a></p>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var token = params.get('token') || '';
var subUrl = 'https://ebynadomy.com/sub/' + token;
var deepLink = '';
var btn = document.getElementById('openBtn');

function openApp() {
  if (deepLink) window.location.href = deepLink;
}

btn.addEventListener('click', openApp);

fetch('https://crypto.happ.su/api-v2.php', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ url: subUrl })
})
.then(function(r) { return r.json(); })
.then(function(data) {
  deepLink = data.encrypted_link || ('happ://add/' + subUrl);
  btn.disabled = false;
  btn.innerHTML = 'Открыть Happ';
  setTimeout(openApp, 300);
})
.catch(function() {
  deepLink = 'happ://add/' + subUrl;
  btn.disabled = false;
  btn.innerHTML = 'Открыть Happ';
});
</script>
</body>
</html>
