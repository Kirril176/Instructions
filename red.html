<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Открыть Happ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 20px; padding: 40px 30px; max-width: 380px; width: 100%; text-align: center; }
.icon { font-size: 64px; margin-bottom: 20px; }
h1 { font-size: 1.5rem; margin-bottom: 10px; }
.sub { font-size: 0.9rem; color: #888; margin-bottom: 30px; }
.btn { display: block; width: 100%; padding: 16px; border-radius: 12px; border: none; cursor: pointer; font-size: 1rem; font-weight: 600; margin-bottom: 12px; text-decoration: none; transition: opacity 0.2s; }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.btn-secondary { background: #2a2a4e; color: #ccc; border: 1px solid #3a3a6e; }
.btn:hover { opacity: 0.9; }
.link-box { background: #0a0a0f; border: 1px solid #2a2a4e; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 0.75rem; color: #667eea; word-break: break-all; margin-bottom: 12px; text-align: left; }
.hint { font-size: 0.8rem; color: #666; margin-top: 8px; }
.steps { text-align: left; background: #0a0a0f; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
.step { font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🛡️</div>
  <h1>Открыть Happ</h1>
  <p class="sub">Нажмите кнопку ниже чтобы открыть приложение и импортировать подписку</p>

  <a href="happ://add/https://ebynadomy.com/sub/TEST123" class="btn btn-primary">Открыть Happ</a>

  <div class="steps">
    <div class="step">1 Нажмите кнопку выше</div>
    <div class="step">2️⃣ Если не открылось — скопируйте ссылку ниже</div>
    <div class="step">3️⃣ Вставьте в приложение: кнопка «+» → «Импорт из буфера»</div>
  </div>

  <div class="link-box" id="sublink">https://ebynadomy.com/sub/TEST123</div>
  <button class="btn btn-secondary" onclick="copyLink()">📋 Скопировать ссылку</button>

  <p class="hint">Нет приложения? <a href="https://happ.su" style="color:#667eea">Установить Happ</a></p>
</div>

<script>
// Автоматически пробуем открыть приложение
setTimeout(function() {
  window.location.href = "happ://add/https://ebynadomy.com/sub/TEST123";
}, 500);

function copyLink() {
  navigator.clipboard.writeText("https://ebynadomy.com/sub/TEST123").then(function() {
    var btn = document.querySelector('.btn-secondary');
    btn.textContent = '✅ Скопировано!';
    setTimeout(function() { btn.textContent = '📋 Скопировать ссылку'; }, 2000);
  });
}
</script>
</body>
</html>
